<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compliment & Joke Generator</title>

    <!-- Google Fonts: Nunito for card text, Lato for UI -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Decorative background blobs -->
    <div class="blobs" aria-hidden="true">
      <div class="blob blob--1"></div>
      <div class="blob blob--2"></div>
      <div class="blob blob--3"></div>
      <div class="blob blob--4"></div>
    </div>

    <main class="page-wrapper">

      <!-- Playing card with a front (compliment) and back (joke) face -->
      <div class="playing-card" id="playing-card">

        <!-- Front face -->
        <div class="playing-card__face playing-card__front">
          <span class="playing-card__corner playing-card__corner--tl" aria-hidden="true">✦</span>
          <span class="playing-card__corner playing-card__corner--br" aria-hidden="true">✦</span>
          <p id="compliment-text" role="status" aria-live="polite">
            Click "Get a Compliment" to brighten your day!
          </p>
        </div>

        <!-- Back face -->
        <div class="playing-card__face playing-card__back">
          <span class="playing-card__corner playing-card__corner--tl" aria-hidden="true">★</span>
          <span class="playing-card__corner playing-card__corner--br" aria-hidden="true">★</span>
          <div class="joke" role="status" aria-live="polite">
            <p class="joke__setup" id="joke-setup">Click "Get a Joke" for a laugh!</p>
            <p class="joke__punchline" id="joke-punchline"></p>
          </div>
        </div>

      </div>

      <!-- Buttons sit independently below the card -->
      <div class="button-row">
        <button class="btn btn--compliment" id="compliment-btn" type="button">
          Get a Compliment
        </button>
        <button class="btn btn--joke" id="joke-btn" type="button">
          Get a Joke
        </button>
      </div>

    </main>

    <script src="script.js"></script>
  </body>
</html>
